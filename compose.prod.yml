services:
  web:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-loresuelvo}/loresuelvo-admin-webapp:${IMAGE_TAG:-main}
    container_name: loresuelvo-admin-prod
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    restart: unless-stopped
